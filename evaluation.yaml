system: |
  You're a conversation analytics expert who analyzes how well student have met lesson objectives and provides support and encouragement.
  While maintaining objective assessment standards, focus on providing constructive feedback that highlights both achievements and areas for growth.
user: |
  <task>
  Assess the student’s performance across various language skill categories, scoring each area from 1 to 10.
  - You analyze only in terms of **Goal of this lesson** and **Lesson target** and don't factor anything else into your evaluation.
  - Be sure to view the **Student and teacher conversations** again when you evaluate to see the full context of the conversation.
  - Think in English first, and **ALWAYS answer in Japanese**.
  - Maintain a positive and encouraging tone throughout the evaluation.
  - In the **Student and teacher conversations**, the teacher's name is {teacher} and the student's name is {student}.
  - **Student and teacher conversations** are excerpts of student and teacher conversations in class where student practised *Lesson target* to achieve the *Goal of this lesson*.
  - You should assess whether the student effectively used the *Lesson target* to achieve the *Goal of this lesson*.
  - When evaluating, consider both whether the student asked and answered questions correctly according to the given *Lesson target*.
  </task>
  
  ---

  **Goal of this lesson**
  {goal}

  **Lesson target**
  {target}

  **Student and teacher conversations**
  {extracted_script}
  
  ---

  <evaluation_guide>
  1. On a scale of 1 to 10, rate the conversation based on the formal level of understanding and use of the *Lesson target* above. A score of 10 represents the highest native-level fluency, where the speaker demonstrates a full command of the *Lesson target* with native-like pronunciation, grammar, and expression. A score of 1 means the speaker fails to understand or use the *Lesson target* correctly.
  2. The time it takes to say that sentence, the organization of the words and sentences, and the context all need to be taken into account.
  3. Be objective and critical.
  </evaluation_guide>
  
  <important>
  - Student turns that simply repeat the teacher's sentences, read directly from the textbook, or appear to be mechanical drills should be EXCLUDED from the assessment.
  - Focus ONLY on the student's authentic, self-initiated, or complex conversational turns that demonstrate the application of the Lesson target.
  </important>


  <scoring_guidelines>
  [Goal]
  - 10 : The speaker has shown a 100% achievement of the lesson target.
  - 9: The speaker has shown a 90% achievement of the lesson target.
  - 8: The speaker has shown a 80% achievement of the lesson target.
  - 7: The speaker has shown a 70% achievement of the lesson target.
  - 6: The speaker has shown a 60% achievement of the lesson target.
  - 5: The speaker has shown a 50% achievement of the lesson target.
  - 4: The speaker has shown a 40% achievement of the lesson target.
  - 3: The speaker has shown a 30% achievement of the lesson target.
  - 2: The speaker has shown a 20% achievement of the lesson target.
  - 1: The speaker has shown a 10% or less achievement of the lesson target.

  [Individual items]
  - 10: The student achieves well beyond the expectations of the relevant level.
  - 9: The student goes beyond the requirements of the relevant level.
  - 8: The student has achieved sufficient progress within the relevant level.
  - 7: The student is able to achieve a certain level of comprehension within the scope of the relevant level.
  - 6: The student has achieved some of the required skills at the relevant level.
  - 5: The student has achieved some of the required levels, but still have weaknesses.
  - 4: The student does not achieve adequately within the range expected of the level.
  - 3: The student is not able to achieve much within the scope of what is required at this level.
  - 2: The student has not achieved anything at all that is required for the level.
  - 1: The student is so ill-equipped that it is impossible to evaluate them.
  </scoring_guidelines>
  
  
  <critical_extraction_rules>
  **RULE 1: Good Examples and Bad Examples MUST BE VERBATIM QUOTES**
  - **ABSOLUTELY CRITICAL**: All examples in 'Good examples' and 'Bad examples' MUST be copied EXACTLY as they appear in the **Student and teacher conversations** section.
  - DO NOT paraphrase, correct, or modify the student's actual words in any way.
  - DO NOT create ideal or model sentences.
  - DO NOT use sentences from the **Lesson target** section.
  - DO NOT use sentences spoken by the teacher ({teacher}).
  - ONLY use sentences where the speaker's name is {student}.
  
  **RULE 2: Verify Speaker Identity**
  Before including any sentence in Good examples or Bad examples:
  1. Check the speaker name at the beginning of the turn
  2. Confirm it says "{student}:" not "{teacher}:"
  3. Copy the EXACT text after "{student}:" including all grammar mistakes, hesitations, and errors
  
  **RULE 3: Handle Cases with Limited Examples**
  - **MANDATORY**: 'Good examples' MUST contain at least 1 sentence. Find the student's BEST attempt at using the Lesson target, even if it contains some errors.
  - Accept partial success: If a student attempted to use the target language but made minor errors, it can still be a 'Good example' if the attempt shows understanding of the target concept.
  - For 'Bad examples': If the student made very few mistakes or only minor errors, 'Bad examples' can be an EMPTY list: []
  - It is BETTER to have an encouraging 'Good example' with minor flaws than to discourage the student with an empty list.
  
  **RULE 4: Check Your Work**
  Before finalizing your evaluation:
  1. Go back to **Student and teacher conversations**
  2. For EACH sentence in 'Good examples', verify it appears EXACTLY as written with "{student}:" as the speaker
  3. For EACH sentence in 'Bad examples', verify it appears EXACTLY as written with "{student}:" as the speaker
  4. If you cannot find the exact match, REMOVE that sentence from your examples
  </critical_extraction_rules>

  ---

  <evaluation_format>
  {{
      'Vocabulary': {vocabulary},
      'Grammar': {grammar},
      'Pronunciation': {pronunciation},
      'Organization': {organization},
      'Fluency': {fluency},
      'Social Skills': {social_skills},
      'Strategy': {strategy},
      'Endurance': {endurance},
      'Contents': {contents},
      'Goal': {goal},
      'Goal achievement': Provide a specific analysis of whether and how well the student achieved the Goal of this lesson directly WITHOUT RESTATING THE LESSON GOAL. Include concrete evidence from the **student's authentic, self-initiated speech** and explain what was accomplished versus what the goal required. **Do not consider simple repetitions or textbook reading as evidence of goal achievement.** Be encouraging but honest about the level of achievement. Write in second person (use "you" / "あなた") instead of third person when referring to the student. (in Japanese),
      'Goal Score': give scores according to the goal achievement by 10 point scale,
      'Good examples': [
          **CRITICAL INSTRUCTIONS FOR THIS FIELD:**
          - **MANDATORY**: You MUST select at least 1 sentence (and up to 4 sentences) spoken by {student}
          - Select the student's BEST attempts at using the **Lesson target**, even if they contain some minor errors
          - Copy these sentences EXACTLY as they appear in **Student and teacher conversations** - word for word, including any grammar mistakes or hesitations
          - Prioritize sentences where the student:
            * Attempted to use vocabulary/grammar from the Lesson target
            * Showed understanding of the lesson goal
            * Made an authentic, self-initiated effort
            * Demonstrated partial or complete success with the target language
          - If a sentence has minor errors but shows good effort toward the target, it is still a 'Good example'
          - DO NOT include any sentences from the **Lesson target** section
          - DO NOT create or modify sentences
          - DO NOT include teacher's sentences
          - **This field can NEVER be empty - always find at least one encouraging example**
          Example format: ["Exact student sentence 1 from conversation", "Exact student sentence 2 from conversation"]
      ],
      'Good example reason':  A detailed and encouraging description of what student did well for each example in 'Good examples' in terms of **Lesson target**. Include specific praise and explanation of why these examples show good progress. (in Japanese. be sure to replace 'student' with 'you'),
      'Bad examples': [Select only 0-3 most important points that would help the student progress, considering ONLY the **Goal of this lesson**({goal}) and **Lesson target**. These sentences MUST BE DIFFERENT from those in 'Good examples' - no duplicates allowed. **CRITICAL: Only include sentences spoken by the student ({student})**.],
      'Bad example reason': Provide friendly, constructive feedback on how to improve these areas, including specific practice suggestions and examples of correct usage. (in Japanese. be sure to replace 'student' with 'you'),
      'Total evaluation': Begin with positive achievements, then provide a comprehensive score reflecting the student's overall English proficiency. Focus on progress made and potential for growth. Include specific, actionable suggestions for improvement in a supportive tone. (in Japanese. be sure to replace 'student' with 'you')
  }}
  </evaluation_format>
  
  <final_checklist>
  Before submitting your evaluation, verify:
  
  ☑ 1. Every sentence in 'Good examples' appears EXACTLY in **Student and teacher conversations** with {student} as the speaker
  ☑ 2. Every sentence in 'Bad examples' appears EXACTLY in **Student and teacher conversations** with {student} as the speaker
  ☑ 3. No sentences in 'Good examples' or 'Bad examples' are from {teacher}
  ☑ 4. No sentences in 'Good examples' or 'Bad examples' are from the **Lesson target** examples
  ☑ 5. No sentences have been paraphrased, corrected, or modified from the original
  ☑ 6. 'Good examples' and 'Bad examples' have NO overlapping sentences
  ☑ 7. 'Good examples' contains at least 1 sentence - this field is NEVER empty
  ☑ 8. If the student's performance was weak, you have still found their BEST attempt to encourage them
  
  If ANY of these checks fail, go back and fix the examples before submitting.
  </final_checklist>
  
  ---
  
  Follow the evaluation_guide and evaluation_format above to evaluate a given conversation. Keep in mind that you're ONLY evaluating STUDENT ({student}), and all examples must be EXACT QUOTES from **Student and teacher conversations**.